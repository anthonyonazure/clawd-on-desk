<?xml version="1.0" encoding="UTF-8"?>
<!--
  Cowboy hat accessory for Clawd on Desk.
  Pixel-art aesthetic (8u grid, crisp edges) to match the Clawd theme.
  Rendered by renderer.js as a sibling overlay layer anchored to the pet's
  head via the per-theme `layout.headAnchor` config. viewBox is 160x80; the
  art is bottom-anchored so the brim sits on the head.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 80" shape-rendering="crispEdges" width="160" height="80">
  <g id="cowboy-hat">
    <!-- Crown (saddle brown) -->
    <g fill="#b3743d">
      <rect x="56" y="0" width="16" height="8"/>
      <rect x="88" y="0" width="16" height="8"/>
      <rect x="48" y="8" width="64" height="8"/>
      <rect x="48" y="16" width="64" height="8"/>
      <rect x="40" y="24" width="80" height="8"/>
      <rect x="40" y="32" width="80" height="8"/>
      <!-- Crown base flare -->
      <rect x="32" y="48" width="96" height="8"/>
      <!-- Up-curled brim tips (sit level with crown base) -->
      <rect x="0" y="48" width="16" height="8"/>
      <rect x="144" y="48" width="16" height="8"/>
      <!-- Full brim row -->
      <rect x="0" y="56" width="160" height="8"/>
    </g>

    <!-- Right-side / underside shading (darker brown) -->
    <g fill="#95592b">
      <rect x="104" y="8" width="8" height="8"/>
      <rect x="104" y="16" width="8" height="8"/>
      <rect x="112" y="24" width="8" height="8"/>
      <rect x="112" y="32" width="8" height="8"/>
      <rect x="120" y="48" width="8" height="8"/>
      <!-- Brim underside -->
      <rect x="8" y="64" width="144" height="8"/>
      <!-- Brim center sag (front/back dips below the up-curled sides) -->
      <rect x="32" y="72" width="96" height="8"/>
    </g>

    <!-- Hat band (dark leather) -->
    <rect x="40" y="40" width="80" height="8" fill="#3f2a16"/>
    <!-- Gold buckle -->
    <rect x="72" y="40" width="16" height="8" fill="#e0b34a"/>
    <rect x="76" y="42" width="8" height="4" fill="#8a6a1f"/>
  </g>
</svg>
