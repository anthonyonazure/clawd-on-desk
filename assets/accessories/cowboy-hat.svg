<?xml version="1.0" encoding="UTF-8"?>
<!--
  Cowboy hat accessory for Clawd on Desk. viewBox 200x120 (aspect ~1.667).
  Injected into the pet SVG (parented to the body group) so it tracks the head
  through every pose and animation. Clear silhouette: wide upturned brim,
  creased cattleman crown, leather band + gold buckle.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 103" width="200" height="103">
  <g stroke="#2e1c0d" stroke-width="3" stroke-linejoin="round">
    <!-- Brim: wide crescent, sides curled up, slight front dip -->
    <path d="M16,66 Q100,86 184,66 L184,73 Q100,100 16,73 Z" fill="#9c6837"/>
    <!-- Crown: cattleman crease (two humps, center dip) -->
    <path d="M60,71 C54,33 76,23 88,24 Q100,33 112,24 C124,23 146,33 140,71 Z" fill="#b07a45"/>
    <!-- Leather band -->
    <path d="M58,59 Q100,67 142,59 L142,70 Q100,78 58,70 Z" fill="#3c2815" stroke="none"/>
    <!-- Gold buckle -->
    <rect x="92" y="60" width="15" height="10" rx="1.5" fill="#e3b54a" stroke-width="1.5"/>
  </g>
  <!-- Brim top highlight for a touch of depth -->
  <path d="M40,69 Q100,84 160,69" fill="none" stroke="#b07a45" stroke-width="2.5" opacity="0.7"/>
</svg>
