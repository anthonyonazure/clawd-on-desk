<?xml version="1.0" encoding="UTF-8"?>
<!-- Top hat — pixel art (14x10 grid). Cylinder crown, red band, wide brim. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14 10" shape-rendering="crispEdges" width="14" height="10">
  <!-- Crown -->
  <g fill="#26262e">
    <rect x="4" y="0" width="6" height="1"/>
    <rect x="4" y="1" width="6" height="1"/>
    <rect x="4" y="2" width="6" height="1"/>
    <rect x="4" y="3" width="6" height="1"/>
    <rect x="4" y="4" width="6" height="1"/>
    <rect x="4" y="5" width="6" height="1"/>
    <rect x="4" y="7" width="6" height="1"/>
  </g>
  <!-- Red band -->
  <rect x="4" y="6" width="6" height="1" fill="#b03a3a"/>
  <!-- Brim -->
  <rect x="0" y="8" width="14" height="1" fill="#1c1c22"/>
  <rect x="2" y="9" width="10" height="1" fill="#1c1c22"/>
</svg>
