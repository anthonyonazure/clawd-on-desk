<?xml version="1.0" encoding="UTF-8"?>
<!-- Halo — pixel art (14x5 grid). Blocky golden ring. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14 5" shape-rendering="crispEdges" width="14" height="5">
  <g fill="#ffd84d">
    <rect x="4" y="0" width="6" height="1"/>
    <rect x="2" y="1" width="2" height="1"/>
    <rect x="10" y="1" width="2" height="1"/>
    <rect x="1" y="2" width="1" height="1"/>
    <rect x="12" y="2" width="1" height="1"/>
    <rect x="2" y="3" width="2" height="1"/>
    <rect x="10" y="3" width="2" height="1"/>
    <rect x="4" y="4" width="6" height="1"/>
  </g>
  <!-- Top highlight -->
  <rect x="4" y="0" width="6" height="1" fill="#fff3b0"/>
</svg>
