<?xml version="1.0" encoding="UTF-8"?>
<!-- Pumpkin hat accessory (seasonal: October). Pumpkin base rests at viewBox bottom. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 130" width="150" height="130">
  <!-- Stem -->
  <rect x="68" y="6" width="14" height="22" rx="4" fill="#5c8a32" stroke="#3f5f22" stroke-width="3"/>
  <!-- Pumpkin body (overlapping lobes) -->
  <g fill="#ef8a26" stroke="#b85f12" stroke-width="3">
    <ellipse cx="75" cy="78" rx="62" ry="46"/>
    <ellipse cx="50" cy="78" rx="34" ry="46"/>
    <ellipse cx="100" cy="78" rx="34" ry="46"/>
  </g>
  <!-- Jack-o'-lantern face -->
  <g fill="#3a2410">
    <polygon points="48,64 64,64 56,80"/>
    <polygon points="86,64 102,64 94,80"/>
    <path d="M40,94 q10,12 22,4 q13,12 26,2 q12,10 22,-2 q-8,22 -36,22 q-26,0 -34,-26 Z"/>
  </g>
</svg>
