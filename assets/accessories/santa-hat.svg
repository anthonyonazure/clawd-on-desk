  <!-- Red flopping cone -->
  <path d="M30,108 Q40,40 95,32 Q150,24 156,60 Q150,86 120,104 Z"
        fill="#d8332f" stroke="#9c2420" stroke-width="4" stroke-linejoin="round"/>
  <!-- White fur trim -->
  <rect x="20" y="100" width="118" height="30" rx="15" fill="#f4f4f4" stroke="#cfcfcf" stroke-width="3"/>
  <!-- Pompom -->
  <circle cx="156" cy="58" r="17" fill="#f4f4f4" stroke="#cfcfcf" stroke-width="3"/>
</svg>
