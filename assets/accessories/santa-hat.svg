<?xml version="1.0" encoding="UTF-8"?>
<!-- Santa hat — pixel art (16x9 grid). Red flopping cone, white fur + pompom. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 9" shape-rendering="crispEdges" width="16" height="9">
  <!-- Pompom -->
  <rect x="12" y="0" width="3" height="2" fill="#f4f4f4"/>
  <!-- Red flopping body -->
  <g fill="#d8332f">
    <rect x="9" y="2" width="5" height="1"/>
    <rect x="6" y="3" width="7" height="1"/>
    <rect x="4" y="4" width="8" height="1"/>
    <rect x="3" y="5" width="8" height="1"/>
    <rect x="2" y="6" width="8" height="1"/>
  </g>
  <!-- White fur trim -->
  <rect x="1" y="7" width="12" height="1" fill="#f4f4f4"/>
  <rect x="1" y="8" width="12" height="1" fill="#e3e3e3"/>
</svg>
